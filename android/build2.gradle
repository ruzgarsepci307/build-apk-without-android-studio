buildscript{
    repositories{
        google()
        maven {
            url "https://jcenter.bintray.com"
        }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.6.1'
    }
}

allprojects{
    repositories{
        google()
        maven {
            url "https://jcenter.bintray.com"
        }
    }
}

task clean(type: Delete){
    delete rootProject.buildDir
}
